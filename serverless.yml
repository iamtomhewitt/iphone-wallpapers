service: iphone-wallpapers
frameworkVersion: '3'
useDotenv: true

provider:
  lambdaHashingVersion: 20201221
  name: aws
  region: eu-west-1
  runtime: nodejs24.x
  stage: api
  timeout: 30
  apiGateway:
    binaryMediaTypes:
      - "*/*"

package:
  patterns:
    - '!**'
    - dist/**
    - node_modules/**

functions:
  wallpaper:
    description: Generates a wallpaper image for iPhone
    events:
      - http:
          cors: true
          method: get
          path: /wallpaper
    handler: dist/lambda/generate-wallpaper.handler
    logRetentionInDays: 7
    name: iphone-wallpapers-generate-wallpaper
    role:
      Fn::GetAtt:
        - LambdaRole
        - Arn

  contributions:
    description: Scrapes Gitlab/Github for contributions, and saves them to a S3 bucket
    handler: dist/lambda/get-contributions.handler
    logRetentionInDays: 7
    name: iphone-wallpapers-get-contributions
    timeout: 600
    events:
      - schedule: rate(6 hours)
    environment:
      GITHUB_TOKEN: ${env:GITHUB_TOKEN}
      GITLAB_TOKEN: ${env:GITLAB_TOKEN}
    role:
      Fn::GetAtt:
        - LambdaRole
        - Arn

resources:
  Resources:
    LambdaRole:
      Properties:
        AssumeRolePolicyDocument:
          Statement:
            - Action: sts:AssumeRole
              Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
          Version: '2012-10-17'
        Policies:
          - PolicyDocument:
              Statement:
                - Action:
                    - s3:PutObject
                    - s3:GetObject
                    - s3:DeleteObject
                  Effect: Allow
                  Resource:
                    - arn:aws:s3:::iphone-wallpapers-data/*
                - Action:
                    - s3:ListBucket
                  Effect: Allow
                  Resource:
                    - arn:aws:s3:::iphone-wallpapers-data
                - Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Effect: Allow
                  Resource: '*'
              Version: '2012-10-17'
            PolicyName: IPhoneWallPapersLambdaPolicy
        RoleName: iphone-wallpapers-lambda-role
      Type: AWS::IAM::Role
    
    DataBucket:
      Properties:
        BucketName: iphone-wallpapers-data
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          BlockPublicPolicy: true
          IgnorePublicAcls: true
          RestrictPublicBuckets: true
      Type: AWS::S3::Bucket