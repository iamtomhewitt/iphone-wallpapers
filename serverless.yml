service: iphone-wallpapers
frameworkVersion: '3'
useDotenv: true

provider:
  lambdaHashingVersion: 20201221
  name: aws
  region: eu-west-1
  runtime: nodejs24.x
  stage: api
  timeout: 30
  apiGateway:
    binaryMediaTypes:
      - "*/*"

package:
  patterns:
    - '!**'
    - dist/**
    - node_modules/**

functions:
  wallpaper:
    description: Generates a wallpaper image for iPhone
    events:
      - http:
          cors: true
          method: get
          path: /wallpaper
    handler: dist/generate-wallpaper.handler
    logRetentionInDays: 7
    name: iphone-wallpapers-generate-wallpaper
    role:
      Fn::GetAtt:
        - LambdaRole
        - Arn

resources:
  Resources:
    LambdaRole:
      Properties:
        AssumeRolePolicyDocument:
          Statement:
            - Action: sts:AssumeRole
              Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
          Version: '2012-10-17'
        Policies:
          - PolicyDocument:
              Statement:
                - Action:
                    - logs:CreateLogGroup
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                  Effect: Allow
                  Resource: '*'
              Version: '2012-10-17'
            PolicyName: IPhoneWallPapersLambdaPolicy
        RoleName: iphone-wallpapers-lambda-role
      Type: AWS::IAM::Role